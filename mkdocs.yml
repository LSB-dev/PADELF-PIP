site_name: padelf
site_description: Load publicly available electric load forecasting datasets as pandas DataFrames.
site_url: https://lsb-dev.github.io/padelf-pip/
repo_url: https://github.com/LSB-dev/padelf-pip

theme:
  name: material
  palette:
    primary: teal
    accent: teal
  features:
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Available Datasets: datasets.md
  - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
